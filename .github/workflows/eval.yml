name: LLMWatch RAGAS Evaluation

on:
  pull_request:
    branches: [main, develop]

jobs:
  evaluate:
    name: Run RAGAS Eval & Post Results
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RAGAS evaluation
        id: eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          EVAL_SCORE_THRESHOLD: "0.80"
        run: |
          python eval/run_eval.py \
            --output-json eval_scores.json \
            --output-comment pr_comment.md \
            --threshold 0.80
        continue-on-error: true

      - name: Read scores
        id: scores
        if: always()
        run: |
          if [ -f eval_scores.json ]; then
            echo "overall=$(jq '.overall' eval_scores.json)" >> $GITHUB_OUTPUT
            echo "passed=$(jq '.passed' eval_scores.json)" >> $GITHUB_OUTPUT
          else
            echo "overall=0" >> $GITHUB_OUTPUT
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Post PR comment with scores
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            let body;
            if (fs.existsSync('pr_comment.md')) {
              body = fs.readFileSync('pr_comment.md', 'utf8');
            } else {
              body = '## LLMWatch Evaluation Results\n\n❌ Evaluation failed to run. Check workflow logs.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail PR if score below threshold
        if: steps.scores.outputs.passed == 'false'
        run: |
          echo "RAGAS overall score is below the 0.80 threshold. PR blocked."
          exit 1
